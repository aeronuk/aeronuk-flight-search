name: "CI"

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    name: "Build image"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      packages: "write"
    outputs:
      image: "${{ steps.image.outputs.image }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7.0.0"

      - name: "Log in to GHCR"
        uses: "docker/login-action@v4.4.0"
        with:
          registry: "ghcr.io"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Compute image tag"
        id: "image"
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@v4.2.0"

      - name: "Build and push"
        uses: "docker/build-push-action@v7.3.0"
        with:
          context: "."
          target: "frankenphp_dev"
          push: true
          tags: "${{ steps.image.outputs.image }}"
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"

  composer-lint:
    name: "Composer lint"
    needs: "build"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      packages: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7.0.0"

      - name: "Bootstrap stack"
        uses: "./.github/actions/bootstrap-stack"
        with:
          image: "${{ needs.build.outputs.image }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Composer lint"
        run: "make composer-lint"

      - name: "Stop stack"
        if: always()
        run: "docker compose down -v"

  coding-standards:
    name: "Coding standards"
    needs: "build"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      packages: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7.0.0"

      - name: "Bootstrap stack"
        uses: "./.github/actions/bootstrap-stack"
        with:
          image: "${{ needs.build.outputs.image }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Coding standards"
        run: "make cs"

      - name: "Stop stack"
        if: always()
        run: "docker compose down -v"

  static-analysis:
    name: "Static analysis"
    needs: "build"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      packages: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7.0.0"

      - name: "Bootstrap stack"
        uses: "./.github/actions/bootstrap-stack"
        with:
          image: "${{ needs.build.outputs.image }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Static analysis"
        run: "make stan"

      - name: "Stop stack"
        if: always()
        run: "docker compose down -v"

  phpunit:
    name: "PHPUnit tests"
    needs: "build"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      packages: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7.0.0"

      - name: "Bootstrap stack"
        uses: "./.github/actions/bootstrap-stack"
        with:
          image: "${{ needs.build.outputs.image }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: "PHPUnit"
        run: "make test"

      - name: "Stop stack"
        if: always()
        run: "docker compose down -v"