name: "CI"

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    name: "Build image"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      packages: "write"
    outputs:
      image: "${{ steps.image.outputs.image }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7.0.0"

      - name: "Log in to GHCR"
        uses: "docker/login-action@v4.4.0"
        with:
          registry: "ghcr.io"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Compute image tag"
        id: "image"
        run: |
          echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: "Set up Docker Buildx"
        uses: "docker/setup-buildx-action@v4.2.0"

      - name: "Build and push"
        uses: "docker/build-push-action@v7.3.0"
        with:
          context: "."
          target: "frankenphp_dev"
          push: true
          tags: "${{ steps.image.outputs.image }}"
          cache-from: "type=gha"
          cache-to: "type=gha,mode=max"

  composer-lint:
    name: "Composer lint"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7.0.0"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.2"
        with:
          php-version: "8.4"
          extensions: "ctype, iconv, intl, bcmath"
          coverage: "none"

      - name: "Install dependencies"
        uses: "ramsey/composer-install@4.0.0"

      - name: "Composer lint"
        run: "make composer-lint DOCKER_EXEC="

  coding-standards:
    name: "Coding standards"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7.0.0"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.2"
        with:
          php-version: "8.4"
          extensions: "ctype, iconv"
          coverage: "none"

      - name: "Install dependencies"
        uses: "ramsey/composer-install@4.0.0"
        with:
          # coding-standards doesn't need bcmath/intl (see CLAUDE.md's CI
          # section) — composer-require-checker's transitive php-standard-
          # library dependency does, but the whole locked composer.json
          # (require-dev included) is still platform-checked on every
          # `composer install`, regardless of which job runs it.
          composer-options: "--ignore-platform-req=ext-bcmath --ignore-platform-req=ext-intl"

      - name: "Coding standards"
        run: "make cs DOCKER_EXEC="

  static-analysis:
    name: "Static analysis"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7.0.0"

      - name: "Set up PHP"
        uses: "shivammathur/setup-php@2.37.2"
        with:
          php-version: "8.4"
          extensions: "ctype, iconv"
          coverage: "none"

      - name: "Install dependencies"
        uses: "ramsey/composer-install@4.0.0"
        with:
          # Same reasoning as coding-standards above — phpstan itself
          # doesn't need bcmath/intl either.
          composer-options: "--ignore-platform-req=ext-bcmath --ignore-platform-req=ext-intl"

      - name: "Static analysis"
        run: "make stan DOCKER_EXEC="

  phpunit:
    name: "PHPUnit tests"
    needs: "build"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      packages: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7.0.0"

      - name: "Bootstrap stack"
        uses: "./.github/actions/bootstrap-stack"
        with:
          image: "${{ needs.build.outputs.image }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: "PHPUnit"
        run: "make test"

      - name: "Stop stack"
        if: always()
        run: "docker compose down -v"